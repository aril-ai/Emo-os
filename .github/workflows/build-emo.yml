name: Build EMO OS (AsteroidOS)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-yocto:
    runs-on: ubuntu-22.04
    steps:
      - name: Free up disk space for Yocto
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 chrpath diffstat lz4 gawk wget cpio build-essential unzip

      - name: Clone AsteroidOS
        run: git clone https://github.com/AsteroidOS/asteroid.git

      - name: Compile EMO OS
        run: |
          unzip meta-emo.zip -d asteroid/src/
          
          # Merapikan folder yang tercecer dari ZIP
          mkdir -p asteroid/src/meta-emo/recipes-core/emo-core-kiosk
          mv asteroid/src/meta-emo/recipes-core/emo-core-kiosk.bb asteroid/src/meta-emo/recipes-core/emo-core-kiosk/
          mv asteroid/src/meta-emo/recipes-core/files asteroid/src/meta-emo/recipes-core/emo-core-kiosk/
          
          # [TRIK HACKER]: Hapus dependensi usang
          sed -i 's/nemo-qml-plugin-mce//g' asteroid/src/meta-emo/recipes-core/emo-core-kiosk/emo-core-kiosk.bb
          sed -i 's/nemo-qml-plugin-mce//g' asteroid/src/meta-emo/recipes-qt/emo-kiosk-runner/emo-kiosk-runner.bb
          sed -i 's/qt5-plugin-platform-hwcomposer//g' asteroid/src/meta-emo/recipes-qt/emo-kiosk-runner/emo-kiosk-runner.bb
          
          # [PEMBERSIH COPY-PASTE AI]: Menghapus simbol markdown (```) yang tidak sengaja terbawa!
          sed -i 's/```cmake//g' asteroid/src/meta-emo/recipes-qt/emo-kiosk-runner/files/CMakeLists.txt || true
          sed -i 's/```cpp//g' asteroid/src/meta-emo/recipes-qt/emo-kiosk-runner/files/main.cpp || true
          sed -i 's/```//g' asteroid/src/meta-emo/recipes-qt/emo-kiosk-runner/files/CMakeLists.txt || true
          sed -i 's/```//g' asteroid/src/meta-emo/recipes-qt/emo-kiosk-runner/files/main.cpp || true
          sed -i 's/```qml//g' asteroid/src/meta-emo/recipes-core/emo-core-kiosk/files/*.qml || true
          sed -i 's/```//g' asteroid/src/meta-emo/recipes-core/emo-core-kiosk/files/*.qml || true

          # [HOOK SAPU JAGAT]: Paksa Yocto menyalin file QML dari sumber aslinya!
          echo 'do_install:prepend() {' >> asteroid/src/meta-emo/recipes-core/emo-core-kiosk/emo-core-kiosk.bb
          echo '    cp -r ${THISDIR}/files/* ${WORKDIR}/ || true' >> asteroid/src/meta-emo/recipes-core/emo-core-kiosk/emo-core-kiosk.bb
          echo '    cp -r ${THISDIR}/files/* ${S}/ || true' >> asteroid/src/meta-emo/recipes-core/emo-core-kiosk/emo-core-kiosk.bb
          echo '}' >> asteroid/src/meta-emo/recipes-core/emo-core-kiosk/emo-core-kiosk.bb
          
          cd asteroid
          source ./prepare-build.sh sturgeon
          
          bitbake-layers add-layer ../src/meta-emo
          echo 'IMAGE_INSTALL:append = " emo-core-kiosk emo-kiosk-runner"' >> conf/local.conf
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          
          bitbake asteroid-image



      - name: Upload EMO OS Image
        uses: actions/upload-artifact@v4
        with:
          name: EMO-Watch-Image
          path: asteroid/build/tmp/deploy/images/sturgeon/asteroid-image-sturgeon.ext2
          retention-days: 7
